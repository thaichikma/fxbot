# =============================================================
# FXBot Settings — Main Configuration
# =============================================================

account:
  broker: "FTMO"
  account_type: "swing"           # normal | swing
  challenge_type: "2-step"        # 1-step | 2-step
  challenge_phase: "phase1"       # phase1 | phase2 | funded
  initial_balance: 10000
  currency: "USD"

# Trading pairs
pairs:
  - symbol: "XAUUSD"
    enabled: true
    timeframes:
      bias: "H4"
      structure: "H1"
      entry: "M15"
    max_spread_points: 50
    min_volume: 0.01
    volume_step: 0.01

  - symbol: "EURUSD"
    enabled: true
    timeframes:
      bias: "H4"
      structure: "H1"
      entry: "M15"
    max_spread_points: 20
    min_volume: 0.01
    volume_step: 0.01

  - symbol: "GBPUSD"
    enabled: true
    timeframes:
      bias: "H4"
      structure: "H1"
      entry: "M15"
    max_spread_points: 25
    min_volume: 0.01
    volume_step: 0.01

  - symbol: "USDJPY"
    enabled: true
    timeframes:
      bias: "H4"
      structure: "H1"
      entry: "M15"
    max_spread_points: 20
    min_volume: 0.01
    volume_step: 0.01

  # Crypto — H1 xu hướng + M5 entry (portfolio mở rộng; bật khi broker có symbol)
  - symbol: "BTCUSD"
    enabled: false
    strategy: h1_m5
    h1_bars: 500
    m5_bars: 1000
    timeframes:
      bias: "H1"
      structure: "H1"
      entry: "M5"
    max_spread_points: 200
    min_volume: 0.01
    volume_step: 0.01

  - symbol: "ETHUSD"
    enabled: false
    strategy: h1_m5
    h1_bars: 500
    m5_bars: 1000
    timeframes:
      bias: "H1"
      structure: "H1"
      entry: "M5"
    max_spread_points: 150
    min_volume: 0.01
    volume_step: 0.01

# Risk management
risk:
  risk_per_trade: 0.01            # 1% per trade
  max_concurrent_trades: 3
  max_daily_trades: 8
  max_correlation_trades: 2       # Max same-direction correlated pairs
  max_lot_size: 1.0               # Hard cap lot size

# Machine learning (optional — pip install -r requirements-ml.txt; train: scripts/ml_train.py)
ml:
  enabled: false
  model_path: ""                 # ví dụ: models/xgb_eurusd.pkl
  prob_threshold: 0.58           # P(up) >= threshold → BUY; <= 1-threshold → SELL
  entry_timeframe_key: M15       # khớp cột trong dict data của MLEngine
  min_ohlc_rows: 60
  sl_atr_mult: 2.0               # hệ số nhân biên độ 20 nến (proxy SL)

# Sessions (UTC times)
sessions:
  london:
    start: "07:00"
    end: "16:00"
    auto_trade: true
  new_york:
    start: "12:30"
    end: "21:00"
    auto_trade: true
  asian:
    start: "23:00"
    end: "07:00"
    auto_trade: false

# Strategy params
strategy:
  swing_length: 10
  ob_lookback: 20
  fvg_min_size_pips: 5
  sl_buffer_pips: 5
  tp_ratios:
    - 1.5    # TP1 = 1.5R
    - 2.0    # TP2 = 2.0R
    - 3.0    # TP3 = 3.0R
  tp_portions:
    - 0.50   # Close 50% at TP1
    - 0.30   # Close 30% at TP2
    - 0.20   # Close 20% at TP3
  breakeven_at_tp1: true
  trailing_after_tp2: true
  trailing_distance_pips: 20
  signal_expiry_minutes: 60      # Signal expires after 60 min

# Telegram
telegram:
  enabled: true

# MT5
mt5:
  magic_number: 20260403
  deviation: 20                   # Max slippage in points
  filling_type: "ioc"             # ioc | fok | return

# Economic calendar (Finnhub) — free keys often return 403 on economic calendar; set calendar_enabled: false
news:
  provider: finnhub
  calendar_enabled: false         # true = call Finnhub calendar (needs API tier with access); false = no HTTP
  cache_ttl_minutes: 45
  block_before_high_minutes: 15
  block_after_high_minutes: 15
  block_before_critical_minutes: 30
  block_after_critical_minutes: 30
  critical_keywords:
    - "FOMC"
    - "NFP"
    - "Nonfarm"
    - "CPI"
    - "Fed"
    - "Powell"
  impact_levels_block: ["high"]   # Finnhub impact strings (case-insensitive)

# Backtest (Telegram /backtest, /bt + CLI python -m backtest)
# XAUUSD (file MT4 local, *.csv thường bị gitignore): đặt M15 tại data/XAU_15m_data.csv
#   python -m backtest --symbol XAUUSD --csv data/XAU_15m_data.csv --max-bars 50000 --step 4
# Các TF khác (1h, 4h, 1d, …) dùng để đối chiếu ngoài; engine chỉ cần M15 (tự resample H1/H4).
# scripts/xau_data_info.py — xem nhanh phạm vi ngày / số dòng.
backtest:
  default_csv: data/backtest/sample_m15.csv   # M15 OHLC; đổi path hoặc /backtest path\to\file.csv
  default_symbol: EURUSD
  initial_balance: 10000
  step_bars: 4
  min_m15_bars: 120
  # Telegram /backtest <SYMBOL>: nếu CSV chưa có và MT5 đã kết nối → tự tải M15 rồi chạy backtest
  auto_fetch_mt5: true
  mt5_fetch_bars: 8000
  auto_csv_pattern: "data/backtest/{symbol}_m15.csv"
  # M1: đánh giá đường đi SL/TP chi tiết (entry SMC vẫn trên M15). Để trống = chỉ M15.
  m1_csv: ""
  # Spread / commission / swap — mô hình xấp xỉ; chỉnh theo MT5 Symbol spec / FTMO (thay đổi theo thời điểm).
  # Nguồn tham chiếu công khai: FTMO forex ~$2.50/lot/một chiều (~$5 RT/lot); swap EURUSD bậc ~vài USD/đêm/lot (broker-specific).
  # Vàng/CFD: FTMO dùng % notional — không khớp hoàn toàn với commission cố định/lot; giảm commission hoặc tắt nếu backtest XAU.
  costs:
    enabled: true
    spread_mode: typical          # typical = symbols.yaml typical_spread_points | max_pair | none
    commission_usd_per_lot_round_turn: 5.0    # forex-style RT/lot (≈ FTMO $2.50/side/lot; verify)
    swap_long_usd_per_lot_per_night: -5.5     # ước lượng carry qua đêm (long); xác nhận trên MT5
    swap_short_usd_per_lot_per_night: -2.0    # ước lượng (short); có thể âm hoặc nhỏ hơn long

# System
system:
  scan_interval_seconds: 15
  # fxbot.db: trades/signals/daily_pnl + ohlc_bars (MTF) + simulation_* (giả lập đa khung)
  db_path: "data/fxbot.db"
  log_level: "INFO"
  log_dir: "logs"
  auto_mode: true                 # Hybrid: auto-execute when session allows (London/NY/overlap)
  execution_enabled: false        # Master switch: allow MT5 orders (enable after testing; true on mock dev)
  signal_scan_enabled: true       # Run SMC scan
  signal_dedupe_minutes: 30
  max_signals_per_scan_per_symbol: 2
